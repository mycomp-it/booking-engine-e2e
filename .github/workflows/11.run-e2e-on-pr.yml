name: 11-Run-E2E-Tests-On-PR

on:
  pull_request:
  workflow_dispatch:
    inputs:
      target-url:
        description: 'URL target su cui eseguire i test (sovrascrive la variabile d ambiente)'
        required: false
        type: string

jobs:
  run-e2e-tests:
    name: Run E2E Tests 🎭
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Validate BASE_URL
        run: |
          TARGET_URL="${{ inputs.target-url || vars.BASE_URL }}"
          if [[ -z "${TARGET_URL}" ]]; then
            echo "ERROR: BASE_URL non è configurata."
            echo "Impostala in: GitHub Settings → Environments → staging → Variables → BASE_URL"
            exit 1
          fi
          echo "BASE_URL configurata: ${TARGET_URL}"

      - name: Run E2E Tests
        env:
          CI: true
          BASE_URL: ${{ inputs.target-url || vars.BASE_URL }}
        run: npm test

      - name: Determine report name
        id: report_vars
        if: always()
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "report_name=e2e-report-pr-${{ github.event.pull_request.number }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT
          else
            echo "report_name=e2e-report-${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.report_vars.outputs.report_name }}
          path: playwright-report/
          retention-days: 7
