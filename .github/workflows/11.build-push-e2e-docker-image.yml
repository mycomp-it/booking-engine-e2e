name: 11-Build-Push-E2E-Docker-Image-Staging

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-image:
    name: Build PR Test Image 🏗️
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_name_full_sha: ${{ steps.generate-tag.outputs.image_name_full_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Docker Tag (Jira OR Branch + SHA)
        id: generate-tag
        run: |
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c 1-8)

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          echo "Branch name detected: ${BRANCH_NAME}"

          JIRA_TICKET=$(echo "${BRANCH_NAME}" | grep -o -i "MGC-[0-9]\+" || true)

          if [[ -n "$JIRA_TICKET" ]]; then
            TAG=$(echo "$JIRA_TICKET" | tr '[:lower:]' '[:upper:]')
          else
            TAG=$(echo "${BRANCH_NAME}" | cut -c 1-8)
          fi

          SANITIZED_TAG=$(echo "${TAG}" | sed -e 's/[^a-zA-Z0-9.]/-/g')
          FINAL_TAG="${SANITIZED_TAG}-${COMMIT_SHA}"
          IMAGE_FULL_SHA="ghcr.io/${{ github.repository }}:${FINAL_TAG}"

          echo "image_name_full_sha=${IMAGE_FULL_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.generate-tag.outputs.image_name_full_sha }}

  validate-tests:
    name: Validate E2E Tests ✅
    needs: build-image
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      packages: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate BASE_URL
        run: |
          if [[ -z "${{ vars.BASE_URL }}" ]]; then
            echo "ERROR: BASE_URL non è configurata."
            echo "Impostala in: GitHub Settings → Environments → staging → Variables → BASE_URL"
            exit 1
          fi
          echo "BASE_URL configurata: ${{ vars.BASE_URL }}"

      - name: Run E2E Tests via Local Composite Action
        uses: ./
        with:
          target-url: ${{ vars.BASE_URL }}
          image-full-name: ${{ needs.build-image.outputs.image_name_full_sha }}
          pull-image: 'true'
          mount-local-tests: 'true'
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Report Name
        id: report_vars
        if: always()
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "report_name=e2e-report-pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "report_name=e2e-report-${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.report_vars.outputs.report_name }}
          path: playwright-report/
          retention-days: 7

  cleanup:
    name: Cleanup Artifacts 🧹
    needs: [build-image, validate-tests]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    if: always()

    steps:
      - name: Remove leftover playwright reports
        run: rm -rf playwright-report || true

      - name: Cleanup old PR SHA images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          keep-n-tagged: 20
