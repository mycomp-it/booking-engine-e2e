name: 51-MERGE-Build-Publish-Main

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-main:
    name: Build and Push Main Image 🚀
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c 1-8)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "tag_latest=ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
          echo "tag_main=ghcr.io/${{ github.repository }}:main" >> $GITHUB_OUTPUT
          echo "tag_sha=ghcr.io/${{ github.repository }}:main-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            latest
            main
            main-${{ steps.tags.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=E2E Tests for Booking Engine (Stable)
            org.opencontainers.image.description=Stable Playwright E2E tests container from main branch
            org.opencontainers.image.branch=main
            org.opencontainers.image.version=${{ steps.tags.outputs.sha_short }}
            org.opencontainers.image.workflow.run.id=${{ github.run_id }}

      - name: Build and Push Main Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.tag_latest }}
            ${{ steps.tags.outputs.tag_main }}
            ${{ steps.tags.outputs.tag_sha }}
          labels: ${{ steps.meta.outputs.labels }}

  cleanup:
    name: Cleanup GHCR 🧹
    runs-on: ubuntu-latest
    needs: build-and-push-main
    permissions:
      packages: write
      contents: read

    steps:
      - name: Keep last 10 immagini main-SHA
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          keep-n-tagged: 10
          exclude-tags: latest
