name: 21-Run-E2E-Tests-Reusable

on:
  workflow_call:
    inputs:
      target-url:
        description: 'URL su cui eseguire i test (staging, production, ecc.)'
        required: true
        type: string
      report-name:
        description: 'Nome dell artefatto del report'
        required: false
        type: string
        default: ''
    secrets:
      gh-token:
        description: 'GitHub token del chiamante (opzionale)'
        required: false
  workflow_dispatch:
    inputs:
      target-url:
        description: 'URL su cui eseguire i test'
        required: true
        type: string

jobs:
  run-e2e:
    name: Run E2E Tests 🎭
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E Tests
        env:
          CI: true
          BASE_URL: ${{ inputs.target-url }}
        run: npm test

      - name: Determine report name
        id: report_vars
        if: always()
        run: |
          if [[ -n "${{ inputs.report-name }}" ]]; then
            echo "report_name=${{ inputs.report-name }}" >> $GITHUB_OUTPUT
          else
            echo "report_name=e2e-report-${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.report_vars.outputs.report_name }}
          path: playwright-report/
          retention-days: 7
